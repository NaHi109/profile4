<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>北鉄バス リアルドライブ・ハイパー (前面展望スピード特化版)</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* 映像処理：スピード感のための動的フィルタ */
        #view-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            transition: filter 0.1s;
        }

        /* 運転席コックピット：動画のような前面展望を再現 */
        #cockpit-frame {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            /* 下部のダッシュボードを動画に寄せて配置 */
            background: linear-gradient(to top, #000 0%, #1a1a1a 10%, transparent 25%);
            border-left: 15px solid #222;
            border-right: 15px solid #222;
        }

        /* ハンドル：動画のように少し低めの位置へ */
        #steering-unit {
            position: absolute; bottom: -150px; left: 30%; /* 運転席側に寄せる */
            transform: translateX(-50%); width: 600px; height: 600px; z-index: 20;
            opacity: 0.9;
        }
        #steering-wheel {
            width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Steering_wheel.svg/1024px-Steering_wheel.svg.png') no-repeat center;
            background-size: contain; filter: drop-shadow(0 20px 30px #000);
        }

        /* 計器類：プロフェッショナルなデジタル表示 */
        #hud {
            position: absolute; bottom: 30px; right: 50px; text-align: right;
            color: #00ff00; font-family: 'Courier New', monospace; z-index: 30;
            text-shadow: 0 0 10px rgba(0,255,0,0.7);
        }
        .hud-val { font-size: 60px; font-weight: bold; line-height: 1; }

        #nav-msg {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff; padding: 10px 30px;
            border-radius: 50px; border: 1px solid #e60012; z-index: 100;
        }

        #rescue {
            position: absolute; top: 20px; right: 20px; padding: 10px;
            background: #444; color: #fff; border: none; cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

    <button id="rescue" onclick="resetPos()">地上リセット</button>
    <div id="nav-msg">金沢駅東口ロータリー (↑長押しでフルスロットル)</div>

    <div id="view-container">
        <div id="pano" style="width: 100%; height: 100%;"></div>
    </div>

    <div id="cockpit-frame">
        <div id="steering-unit"><div id="steering-wheel"></div></div>
        <div id="hud">
            <div style="font-size: 14px;">SPEEDOMETER</div>
            <div id="speed-txt" class="hud-val">0</div>
            <div style="font-size: 20px;">km/h</div>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?v=3.exp"></script>

    <script>
        let panorama;
        const START_POS = { lat: 36.577636, lng: 136.649231 };
        let state = {
            lat: START_POS.lat, lng: START_POS.lng,
            heading: 145, speed: 0, wheel: 0, fov: 90
        };
        let keys = {};

        function init() {
            panorama = new google.maps.StreetViewPanorama(
                document.getElementById('pano'), {
                    position: START_POS,
                    pov: { heading: state.heading, pitch: -5 }, // 視点を少し下げてスピード感を出す
                    visible: true,
                    disableDefaultUI: true,
                    zoom: 0 // 広角設定
                }
            );
        }

        function resetPos() {
            state.lat = START_POS.lat; state.lng = START_POS.lng;
            state.speed = 0; state.heading = 145;
            panorama.setPosition(START_POS);
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            // バスらしい強力な加速性能（動画の疾走感を再現）
            if (keys['ArrowUp']) {
                state.speed += 0.5; 
            } else if (keys['ArrowDown']) {
                state.speed -= 1.2;
            } else {
                state.speed -= 0.05; // 慣性走行
            }

            if (state.speed < 0) state.speed = 0;
            if (state.speed > 80) state.speed = 80; // 動画のような高速走行を許容

            // ステアリング（高速時は少し重くなる設定）
            let steerPower = state.speed > 30 ? 0.06 : 0.04;
            if (keys['ArrowLeft']) {
                state.wheel = Math.max(state.wheel - 10, -450);
                state.heading -= (state.speed * steerPower);
            } else if (keys['ArrowRight']) {
                state.wheel = Math.min(state.wheel + 10, 450);
                state.heading += (state.speed * steerPower);
            } else {
                state.wheel *= 0.9;
            }

            // 【スピード演出】速度に応じてFOV（視野角）とブラーを変化させる
            let currentFov = 90 + (state.speed * 0.5); // 速いほど広角に
            let blurVal = (state.speed > 40) ? (state.speed - 40) * 0.05 : 0;
            document.getElementById('view-container').style.filter = `contrast(1.1) brightness(1.1) blur(${blurVal}px)`;

            if (state.speed > 0.1) {
                // 移動計算
                const step = state.speed * 0.000004; // 移動係数をアップしてスピード感を強化
                state.lat += Math.cos(state.heading * Math.PI / 180) * step;
                state.lng += Math.sin(state.heading * Math.PI / 180) * step;
                
                panorama.setPosition({ lat: state.lat, lng: state.lng });
                // pitchを少し深くすることで路面を近くに見せる
                panorama.setPov({ heading: state.heading, pitch: -5, zoom: 0 });
            }

            // UI反映
            document.getElementById('speed-txt').innerText = Math.floor(state.speed);
            document.getElementById('steering-wheel').style.transform = `rotate(${state.wheel}deg)`;

            requestAnimationFrame(update);
        }

        google.maps.event.addDomListener(window, 'load', init);
        update();
    </script>
</body>
</html>
