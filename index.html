<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>北鉄バス Pro - リアルドライブ・シミュレーター</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        
        /* 映像処理：鮮明化フィルタ */
        #street-view-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            filter: contrast(1.1) saturate(1.1) brightness(1.05) sharp(1px);
            z-index: 1;
        }

        /* 運転席：フロントガラスの質感 */
        #cockpit-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.2) 100%);
            z-index: 5; pointer-events: none;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
        }

        /* 3Dハンドル・ユニット */
        #steering-unit {
            position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%);
            width: 500px; height: 500px; z-index: 20; transition: transform 0.05s ease-out;
        }
        #steering-wheel {
            width: 100%; height: 100%;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Steering_wheel.svg/1024px-Steering_wheel.svg.png') no-repeat center;
            background-size: contain; filter: drop-shadow(0 20px 15px rgba(0,0,0,0.9));
        }

        /* プロフェッショナル・ダッシュボード */
        #dashboard {
            position: absolute; bottom: 0; width: 100%; height: 120px;
            background: linear-gradient(to top, #111, #222);
            z-index: 15; display: flex; justify-content: space-around; align-items: center;
            border-top: 3px solid #444; color: #fff;
        }
        .meter { text-align: center; width: 150px; }
        .meter-label { font-size: 11px; color: #888; letter-spacing: 2px; }
        .meter-value { font-size: 32px; font-weight: 700; color: #00ff00; text-shadow: 0 0 10px rgba(0,255,0,0.5); }
        
        #route-display {
            position: absolute; top: 20px; right: 20px; padding: 15px;
            background: rgba(0,0,0,0.85); border-left: 6px solid #e60012;
            color: #fff; z-index: 30; border-radius: 4px; width: 280px;
        }
    </style>
</head>
<body>

    <div id="street-view-container">
        <div id="view-canvas" style="width: 100%; height: 100%;"></div>
    </div>

    <div id="cockpit-overlay"></div>

    <div id="route-display">
        <div style="font-size: 12px; color: #aaa;">HOKUTETSU BUS DRIVE</div>
        <div id="location-name" style="font-size: 20px; font-weight: bold; color: #ffcc00;">金沢駅東口</div>
        <div style="margin-top:5px; height:2px; background:#444;"><div id="progress" style="width:0%; height:100%; background:#e60012;"></div></div>
    </div>

    <div id="steering-unit">
        <div id="steering-wheel"></div>
    </div>

    <div id="dashboard">
        <div class="meter">
            <div class="meter-label">SPEED</div>
            <div id="speed-num" class="meter-value">0</div>
            <span style="font-size: 10px;">KM/H</span>
        </div>
        <div style="text-align: center;">
            <div style="color: #e60012; font-weight: 900; font-size: 24px;">北陸鉄道</div>
            <div style="font-size: 10px; letter-spacing: 3px;">KANAZAWA CITY LINE</div>
        </div>
        <div class="meter">
            <div class="meter-label">HEADING</div>
            <div id="heading-num" class="meter-value">155</div>
            <span style="font-size: 10px;">DEG</span>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?v=3.exp"></script>

    <script>
        let pano;
        let state = {
            lat: 36.578057,
            lng: 136.649111,
            heading: 155,
            speed: 0,
            wheel: 0,
            targetHeading: 155
        };
        let keys = {};

        function init() {
            const panoOptions = {
                position: { lat: state.lat, lng: state.lng },
                pov: { heading: state.heading, pitch: -2 },
                visible: true,
                disableDefaultUI: true,
                clickToGo: false,
                motionTracking: false,
                linksControl: false,
                // 画質優先設定
                imageDateControl: false
            };
            pano = new google.maps.StreetViewPanorama(document.getElementById('view-canvas'), panoOptions);
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function gameLoop() {
            // 入力処理（ラグ防止のためレスポンスを速める）
            if (keys['ArrowUp']) state.speed = Math.min(state.speed + 0.8, 55);
            if (keys['ArrowDown']) state.speed = Math.max(state.speed - 1.5, 0);
            state.speed *= 0.97; // 自然減速

            if (keys['ArrowLeft']) {
                state.wheel = Math.max(state.wheel - 8, -120);
                state.targetHeading -= (state.speed * 0.05);
            } else if (keys['ArrowRight']) {
                state.wheel = Math.min(state.wheel + 8, 120);
                state.targetHeading += (state.speed * 0.05);
            } else {
                state.wheel *= 0.85; // ハンドル復帰
            }

            // 物理移動（座標の微細更新）
            if (state.speed > 0.1) {
                const moveStep = state.speed * 0.0000015;
                state.lat += Math.cos(state.targetHeading * Math.PI / 180) * moveStep;
                state.lng += Math.sin(state.targetHeading * Math.PI / 180) * moveStep;
                
                // ストリートビュー座標・方位の更新
                pano.setPosition({ lat: state.lat, lng: state.lng });
                pano.setPov({ heading: state.targetHeading, pitch: -2 });
            }

            // ビジュアル更新
            document.getElementById('speed-num').innerText = Math.floor(state.speed);
            document.getElementById('heading-num').innerText = Math.floor(state.targetHeading % 360);
            document.getElementById('steering-unit').style.transform = `translateX(-50%) rotate(${state.wheel}deg)`;

            // 特定エリアの判定（武蔵ヶ辻など）
            updateLocationInfo();

            requestAnimationFrame(gameLoop);
        }

        function updateLocationInfo() {
            // 武蔵ヶ辻交差点近辺の座標（概算）
            const distToMusashi = Math.sqrt(Math.pow(state.lat - 36.572186, 2) + Math.pow(state.lng - 136.656519, 2));
            if (distToMusashi < 0.001) {
                document.getElementById('location-name').innerText = "武蔵ヶ辻・近江町市場";
                document.getElementById('progress').style.width = "50%";
            }
            const distToKorinbo = Math.sqrt(Math.pow(state.lat - 36.563032, 2) + Math.pow(state.lng - 136.654316, 2));
            if (distToKorinbo < 0.001) {
                document.getElementById('location-name').innerText = "香林坊（終点）";
                document.getElementById('progress').style.width = "100%";
            }
        }

        google.maps.event.addDomListener(window, 'load', init);
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
