<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>北鉄バス リアルドライブ・プロ (地上ロータリー発)</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #view-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; filter: saturate(1.2); }
        #cockpit { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; background: linear-gradient(to top, #111 0%, transparent 30%); }
        
        /* ハンドル：少し大きく、より運転席らしく */
        #steering-unit { position: absolute; bottom: -120px; left: 50%; transform: translateX(-50%); width: 600px; height: 600px; z-index: 20; }
        #steering-wheel { width: 100%; height: 100%; background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Steering_wheel.svg/1024px-Steering_wheel.svg.png') no-repeat center; background-size: contain; filter: drop-shadow(0 20px 20px #000); }

        #dashboard { position: absolute; bottom: 0; width: 100%; height: 120px; background: #1a1a1a; border-top: 5px solid #e60012; display: flex; justify-content: center; align-items: center; gap: 80px; color: white; z-index: 15; }
        .gauge { text-align: center; background: #000; padding: 10px 40px; border-radius: 8px; border: 1px solid #333; }
        .gauge-val { font-size: 40px; font-weight: bold; color: #00ff00; font-family: monospace; }
        
        #info-panel { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); border-left: 10px solid #e60012; color: #fff; padding: 20px; z-index: 30; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; color: white; font-size: 24px; text-shadow: 2px 2px 4px #000; z-index: 100; pointer-events: none; }
    </style>
</head>
<body>

    <div id="view-container"><div id="pano" style="width: 100%; height: 100%;"></div></div>
    <div id="msg">読み込み中... (画面をクリックして開始)</div>

    <div id="cockpit">
        <div id="steering-unit"><div id="steering-wheel"></div></div>
        <div id="dashboard">
            <div class="gauge">
                <div style="font-size: 10px; color: #888;">SPEED</div>
                <div id="speed-num" class="gauge-val">0</div>
                <div style="font-size: 10px;">km/h</div>
            </div>
            <div style="text-align: center;">
                <div style="color: #e60012; font-weight: 900; font-size: 30px;">北陸鉄道</div>
                <div style="font-size: 10px; letter-spacing: 2px;">KANAZAWA CITY BUS</div>
            </div>
            <div class="gauge">
                <div style="font-size: 10px; color: #888;">STATUS</div>
                <div id="status-text" class="gauge-val" style="font-size: 20px; color: #ffaa00;">IDLE</div>
            </div>
        </div>
    </div>

    <div id="info-panel">
        <div style="font-size: 12px; color: #aaa;">現在地</div>
        <div id="loc-name" style="font-size: 24px; font-weight: bold; color: #ffcc00;">金沢駅東口 鼓門前</div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?v=3.exp"></script>

    <script>
        let panorama;
        let state = {
            // 地上のバスロータリー座標に固定
            lat: 36.578050, 
            lng: 136.649300,
            heading: 140, // 鼓門から市内方向を向く
            speed: 0,
            wheel: 0,
            isMoving: false
        };
        let keys = {};

        function init() {
            panorama = new google.maps.StreetViewPanorama(
                document.getElementById('pano'), {
                    position: { lat: state.lat, lng: state.lng },
                    pov: { heading: state.heading, pitch: -2 },
                    visible: true,
                    disableDefaultUI: true,
                    clickToGo: false,
                    scrollwheel: false
                }
            );
            
            // ロード完了時にメッセージ消去
            google.maps.event.addListenerOnce(panorama, 'status_changed', function() {
                if (panorama.getStatus() === 'OK') {
                    document.getElementById('msg').innerText = "↑キー長押しで加速！";
                    setTimeout(() => { document.getElementById('msg').innerText = ""; }, 3000);
                }
            });
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            state.isMoving = true;
        });
        window.addEventListener('keyup', e => keys[e.code] = false);
        window.addEventListener('mousedown', () => { /* フォーカス用 */ });

        function update() {
            const accel = 0.2;  // 加速
            const brake = 0.6;  // ブレーキ
            const friction = 0.01; // 自然減速（極めて小さい）

            // スピード処理
            if (keys['ArrowUp']) {
                state.speed += accel;
                document.getElementById('status-text').innerText = "DRIVE";
                document.getElementById('status-text').style.color = "#00ff00";
            } else if (keys['ArrowDown']) {
                state.speed -= brake;
                document.getElementById('status-text').innerText = "BRAKE";
                document.getElementById('status-text').style.color = "#ff4444";
            } else {
                state.speed -= friction; // 離してもなかなか止まらない
                if (state.speed < 0.1) {
                    state.speed = 0;
                    document.getElementById('status-text').innerText = "IDLE";
                    document.getElementById('status-text').style.color = "#ffaa00";
                }
            }
            if (state.speed > 60) state.speed = 60; // 最高速度

            // ハンドル・旋回処理
            if (keys['ArrowLeft']) {
                state.wheel = Math.max(state.wheel - 5, -360);
                if (state.speed > 0.5) state.heading -= (state.speed * 0.05);
            } else if (keys['ArrowRight']) {
                state.wheel = Math.min(state.wheel + 5, 360);
                if (state.speed > 0.5) state.heading += (state.speed * 0.05);
            } else {
                state.wheel *= 0.9; // ハンドルが戻る
            }

            // 移動実行
            if (state.speed > 0) {
                const moveStep = state.speed * 0.0000025;
                state.lat += Math.cos(state.heading * Math.PI / 180) * moveStep;
                state.lng += Math.sin(state.heading * Math.PI / 180) * moveStep;
                
                panorama.setPosition({ lat: state.lat, lng: state.lng });
                panorama.setPov({ heading: state.heading, pitch: -2 });
            }

            // UI反映
            document.getElementById('speed-num').innerText = Math.floor(state.speed);
            document.getElementById('steering-wheel').style.transform = `rotate(${state.wheel}deg)`;

            requestAnimationFrame(update);
        }

        // 実行
        google.maps.event.addDomListener(window, 'load', init);
        update();
    </script>
</body>
</html>
