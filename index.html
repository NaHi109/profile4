<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>北鉄バス 3D運転シミュレーター (金沢駅〜香林坊)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #info {
            position: absolute; top: 20px; left: 20px; color: #fff;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px;
            border-left: 5px solid #e60012; pointer-events: none;
        }
        .label { font-size: 12px; color: #aaa; }
        .val { font-size: 24px; font-weight: bold; color: #ffcc00; }
        #nav {
            position: absolute; top: 20px; right: 20px; width: 250px;
            background: rgba(0,0,0,0.8); color: #fff; padding: 10px; border-radius: 5px;
        }
        #guide-msg { position: absolute; top: 20%; width: 100%; text-align: center; color: #fff; font-size: 32px; font-weight: bold; text-shadow: 2px 2px 5px #000; pointer-events: none; }
    </style>
</head>
<body>

<div id="info">
    <div class="label">SPEED</div>
    <div id="speed" class="val">0 km/h</div>
    <div class="label" style="margin-top:10px;">NEXT STOP</div>
    <div id="next-stop" class="val" style="font-size:18px;">武蔵ヶ辻・近江町市場</div>
</div>

<div id="nav">
    <strong style="color:#e60012;">【北鉄バス 運転マニュアル】</strong><br>
    ↑ : アクセル / ↓ : ブレーキ<br>
    ← → : ハンドル<br>
    <small>※武蔵ヶ辻交差点は右折です！</small>
</div>

<div id="guide-msg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, bus;
let speed = 0, angle = 0;
let keys = {};
let objects = [];

init();
animate();

function init() {
    // Scene & Camera
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 1, 1000);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Light
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(100, 200, 100);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x404040));

    // Ground & Roads (Simple City Layout)
    createCity();

    // Player Bus (Placeholder 3D)
    const busGroup = new THREE.Group();
    
    // Body (North-Tetsu Colors)
    const bodyGeom = new THREE.BoxGeometry(2.5, 3, 8);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0xf5f5dc }); // Cream
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    busGroup.add(body);

    const redLine = new THREE.Mesh(
        new THREE.BoxGeometry(2.6, 0.5, 8.1),
        new THREE.MeshPhongMaterial({ color: 0xe60012 })
    );
    redLine.position.y = -0.5;
    busGroup.add(redLine);

    // Windows
    const winGeom = new THREE.BoxGeometry(2.4, 1, 4);
    const winMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
    const frontWin = new THREE.Mesh(winGeom, winMat);
    frontWin.position.set(0, 0.8, -2.1);
    busGroup.add(frontWin);

    bus = busGroup;
    scene.add(bus);
    bus.position.y = 1.5;
    bus.position.z = 0;

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
}

function createCity() {
    // 道路：金沢駅から武蔵ヶ辻まで（直線）
    addRoad(0, 0, 0, 500, 0); 
    // 武蔵ヶ辻交差点
    addBuilding(20, 0, -480, 40, 60, 40, 0x999999); // 交差点ビル
    
    // 右折後の道路（香林坊方面）
    addRoad(250, 0, -500, 500, Math.PI / 2);

    // 街路樹・ビルを配置
    for(let i=0; i<20; i++) {
        addBuilding(-15, 0, -i*50, 10, 20 + Math.random()*30, 15);
        addBuilding(15, 0, -i*50, 10, 25 + Math.random()*20, 15);
    }
}

function addRoad(x, y, z, length, rotation) {
    const roadGeom = new THREE.PlaneGeometry(20, length);
    const roadMat = new THREE.MeshPhongMaterial({ color: 0x333333, side: THREE.DoubleSide });
    const road = new THREE.Mesh(roadGeom, roadMat);
    road.rotation.x = Math.PI / 2;
    road.rotation.z = rotation;
    road.position.set(x, y + 0.01, z);
    scene.add(road);

    // 白線
    const lineGeom = new THREE.PlaneGeometry(0.5, length);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const line = new THREE.Mesh(lineGeom, lineMat);
    line.rotation.x = Math.PI / 2;
    line.rotation.z = rotation;
    line.position.set(x, y + 0.02, z);
    scene.add(line);
}

function addBuilding(x, y, z, w, h, d, col = 0x888888) {
    const geom = new THREE.BoxGeometry(w, h, d);
    const mat = new THREE.MeshPhongMaterial({ color: col });
    const b = new THREE.Mesh(geom, mat);
    b.position.set(x, y + h / 2, z);
    scene.add(b);
}

function updatePhysics() {
    // 加速・減速
    if (keys['ArrowUp']) speed += 0.01;
    if (keys['ArrowDown']) speed -= 0.02;
    speed *= 0.985; // 摩擦
    if (Math.abs(speed) < 0.001) speed = 0;

    // ハンドル
    if (Math.abs(speed) > 0.01) {
        if (keys['ArrowLeft']) angle += 0.02;
        if (keys['ArrowRight']) angle -= 0.02;
    }

    // 移動
    bus.position.x += Math.sin(angle) * speed;
    bus.position.z += Math.cos(angle) * speed;
    bus.rotation.y = angle + Math.PI;

    // カメラ位置（運転席視点）
    camera.position.set(
        bus.position.x - Math.sin(angle) * 1,
        bus.position.y + 1.2,
        bus.position.z - Math.cos(angle) * 1
    );
    camera.rotation.y = angle + Math.PI;

    // UI
    document.getElementById('speed').innerText = Math.floor(speed * 100) + " km/h";

    // 武蔵ヶ辻 右折ガイド
    if (bus.position.z < -450 && bus.position.z > -550 && Math.abs(angle) < 0.5) {
        document.getElementById('guide-msg').innerText = "武蔵ヶ辻交差点：右折してください";
    } else if (bus.position.x > 50) {
        document.getElementById('guide-msg').innerText = "まもなく 武蔵ヶ辻・近江町市場 です";
    } else {
        document.getElementById('guide-msg').innerText = "";
    }
}

function animate() {
    requestAnimationFrame(animate);
    updatePhysics();
    renderer.render(scene, camera);
}

// レスポンシブ対応
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
