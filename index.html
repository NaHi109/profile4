<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>北鉄バス リアルビュー・シミュレーター (金沢駅〜香林坊)</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #000; }
        
        /* ストリートビュー表示エリア */
        #street-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* 運転席オーバーレイ（フロントガラス越し） */
        #cockpit {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(30,30,30,1) 0%, rgba(30,30,30,0.8) 15%, transparent 40%);
            z-index: 10; pointer-events: none;
            border: 20px solid #222; border-bottom: 60px solid #111; box-sizing: border-box;
        }

        /* ハンドル */
        #steering-wheel {
            position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%);
            width: 400px; height: 400px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Steering_wheel.svg/1024px-Steering_wheel.svg.png') no-repeat center;
            background-size: contain; transition: transform 0.1s linear; z-index: 20;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));
        }

        /* ダッシュボード UI */
        #dashboard {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 50px; z-index: 30; color: #fff; text-align: center; width: 80%; justify-content: space-between;
        }
        .gauge { background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 10px; border: 2px solid #e60012; }
        .val { font-size: 30px; font-weight: bold; color: #00ff00; }
        .unit { font-size: 14px; color: #aaa; }

        #top-info {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #ffaa00; padding: 15px 40px;
            font-size: 24px; font-weight: bold; border: 3px solid #444; z-index: 40; border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="street-view"></div>
    <div id="cockpit">
        <div id="steering-wheel"></div>
        <div id="dashboard">
            <div class="gauge">
                <div class="unit">SPEED</div>
                <div id="speed" class="val">0</div>
                <div class="unit">km/h</div>
            </div>
            <div style="font-size: 30px; color: #e60012; font-weight: bold; text-shadow: 2px 2px 0px #fff;">北陸鉄道</div>
            <div class="gauge">
                <div class="unit">CURRENT STOP</div>
                <div id="location" class="val" style="font-size: 18px;">金沢駅東口</div>
            </div>
        </div>
    </div>
    <div id="top-info">NEXT: 武蔵ヶ辻・近江町市場</div>

    <script src="https://maps.googleapis.com/maps/api/js?v=3.exp"></script>

    <script>
        let panorama;
        let speed = 0;
        let heading = 155; // 金沢駅からの初期方位
        let lat = 36.578057; // 金沢駅東口
        let lng = 136.649111;
        let wheelAngle = 0;
        let keys = {};

        // ルート上の主要ポイント (Lat, Lng)
        const waypoints = [
            { name: "金沢駅東口", lat: 36.578057, lng: 136.649111 },
            { name: "リファーレ前", lat: 36.575510, lng: 136.652150 },
            { name: "武蔵ヶ辻（交差点）", lat: 36.572186, lng: 136.656519 },
            { name: "南町・尾山神社", lat: 36.567845, lng: 136.655071 },
            { name: "香林坊（終点）", lat: 36.563032, lng: 136.654316 }
        ];

        function initPano() {
            panorama = new google.maps.StreetViewPanorama(
                document.getElementById('street-view'), {
                    position: { lat: lat, lng: lng },
                    pov: { heading: heading, pitch: 0 },
                    visible: true,
                    disableDefaultUI: true, // 余計なUIを隠す
                    scrollwheel: false,
                    clickToGo: false
                }
            );
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            // アクセル・ブレーキ
            if (keys['ArrowUp']) speed += 0.5;
            if (keys['ArrowDown']) speed -= 1.0;
            speed *= 0.95; // 慣性抵抗
            if (speed < 0) speed = 0;
            if (speed > 60) speed = 60;

            // ハンドル操作
            if (keys['ArrowLeft']) {
                heading -= 1.5;
                wheelAngle -= 5;
            } else if (keys['ArrowRight']) {
                heading += 1.5;
                wheelAngle += 5;
            } else {
                wheelAngle *= 0.9; // ハンドルが戻る
            }

            // 制限
            if (wheelAngle > 90) wheelAngle = 90;
            if (wheelAngle < -90) wheelAngle = -90;

            // 位置更新（簡易計算）
            if (speed > 1) {
                const step = speed * 0.000002;
                lat += Math.cos(heading * Math.PI / 180) * step;
                lng += Math.sin(heading * Math.PI / 180) * step;
                
                panorama.setPosition({ lat: lat, lng: lng });
                panorama.setPov({ heading: heading, pitch: -2 }); // 少し下向きで運転席感
            }

            // UI反映
            document.getElementById('speed').innerText = Math.floor(speed);
            document.getElementById('steering-wheel').style.transform = `translateX(-50%) rotate(${wheelAngle}deg)`;

            // 地点チェック
            waypoints.forEach(wp => {
                const d = Math.sqrt(Math.pow(lat - wp.lat, 2) + Math.pow(lng - wp.lng, 2));
                if (d < 0.0005) {
                    document.getElementById('location').innerText = wp.name;
                    if (wp.name === "香林坊（終点）") {
                        document.getElementById('top-info').innerText = "ご乗車ありがとうございました。";
                    } else {
                        document.getElementById('top-info').innerText = "次は: " + wp.name;
                    }
                }
            });

            requestAnimationFrame(update);
        }

        google.maps.event.addDomListener(window, 'load', initPano);
        update();
    </script>
</body>
</html>
