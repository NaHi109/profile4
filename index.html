<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>北鉄バス 運転席シミュレーター (金沢駅〜香林坊)</title>
    <style>
        body { margin: 0; background: #000; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; overflow: hidden; color: white; }
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        
        /* 運転席の計器類 UI */
        #cockpit-ui {
            position: absolute; bottom: 0; width: 100%; height: 150px;
            background: linear-gradient(0deg, #1a1a1a 0%, #333 100%);
            border-top: 4px solid #555; display: flex; justify-content: space-around; align-items: center;
        }
        .gauge { text-align: center; border: 2px solid #666; border-radius: 50%; width: 100px; height: 100px; display: flex; flex-direction: column; justify-content: center; background: #000; }
        .gauge-val { font-size: 24px; font-weight: bold; color: #0f0; }
        .label { font-size: 10px; color: #aaa; }

        /* 行先案内板 */
        #destination-board {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: #222; border: 3px solid #444; padding: 10px 40px; border-radius: 5px;
            color: #ffaa00; font-family: 'Courier New', Courier, monospace; text-align: center; box-shadow: 0 0 15px rgba(255, 170, 0, 0.3);
        }
        #next-stop { font-size: 28px; font-weight: bold; }
        
        #controls-hint { position: absolute; bottom: 160px; right: 20px; font-size: 12px; color: #ccc; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="destination-board">
        <div style="font-size: 12px;">NEXT STOP</div>
        <div id="next-stop">金沢駅東口 (出発待ち)</div>
    </div>

    <canvas id="driveCanvas"></canvas>

    <div id="controls-hint">加速:↑ / ブレーキ:↓ / ハンドル:← →</div>

    <div id="cockpit-ui">
        <div class="gauge">
            <span class="label">SPEED</span>
            <span id="speed-val" class="gauge-val">0</span>
            <span class="label">km/h</span>
        </div>
        <div style="font-size: 20px; color: #e60012; font-weight: bold;">北陸鉄道</div>
        <div class="gauge">
            <span class="label">DISTANCE</span>
            <span id="dist-val" class="gauge-val">0</span>
            <span class="label">m</span>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('driveCanvas');
const ctx = canvas.getContext('2d');
const speedEl = document.getElementById('speed-val');
const distEl = document.getElementById('dist-val');
const nextStopEl = document.getElementById('next-stop');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight - 150;

let state = {
    speed: 0,
    distance: 0,
    offset: 0, // カーブやハンドルの揺れ
    playerX: 0,
    stopIndex: 0,
    items: [] // 街並みのオブジェクト
};

const stops = [
    { name: "武蔵ヶ辻・近江町市場", dist: 800 },
    { name: "南町・尾山神社", dist: 1500 },
    { name: "香林坊", dist: 2200 },
    { name: "終点・金沢市役所前", dist: 2800 }
];

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// 建物や街灯などのオブジェクト生成
function createWorld() {
    for (let i = 0; i < 50; i++) {
        state.items.push({
            z: i * 200,
            x: Math.random() > 0.5 ? 1.5 : -1.5,
            type: Math.random() > 0.3 ? 'building' : 'tree'
        });
    }
}

function update() {
    // 加速・ブレーキ
    if (keys['ArrowUp']) state.speed += 0.2;
    if (keys['ArrowDown']) state.speed -= 0.5;
    state.speed *= 0.98; // 摩擦
    if (state.speed < 0) state.speed = 0;
    if (state.speed > 60) state.speed = 60;

    // ハンドル
    if (keys['ArrowLeft']) state.playerX -= 0.05;
    if (keys['ArrowRight']) state.playerX += 0.05;
    state.playerX *= 0.95; // 復元力

    // 走行距離
    state.distance += state.speed * 0.1;

    // UI更新
    speedEl.innerText = Math.floor(state.speed);
    distEl.innerText = Math.floor(state.distance);

    // バス停判定
    if (state.stopIndex < stops.length) {
        let target = stops[state.stopIndex];
        nextStopEl.innerText = target.name;
        
        if (Math.abs(state.distance - target.dist) < 20 && state.speed < 2) {
            state.speed = 0;
            state.stopIndex++;
            alert(target.name + " に到着しました。次は " + (stops[state.stopIndex]?.name || "終点") + " です。");
        }
    }
}

function draw() {
    const w = canvas.width;
    const h = canvas.height;
    const midY = h / 2;

    // 背景：空
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(0, 0, w, midY);
    
    // 背景：地面（道路）
    ctx.fillStyle = "#555";
    ctx.fillRect(0, midY, w, midY);

    // 遠近感のある道路の描画
    ctx.fillStyle = "#777";
    ctx.beginPath();
    ctx.moveTo(w * 0.45, midY);
    ctx.lineTo(w * 0.55, midY);
    ctx.lineTo(w, h);
    ctx.lineTo(0, h);
    ctx.fill();

    // センターライン
    ctx.strokeStyle = "#fff";
    ctx.setLineDash([20, 20]);
    ctx.beginPath();
    ctx.moveTo(w / 2 + (state.playerX * 100), midY);
    ctx.lineTo(w / 2 - (state.playerX * 1000), h);
    ctx.stroke();

    // 建物や景色の描画（簡易擬似3D）
    state.items.forEach(item => {
        let zPos = (item.z - (state.distance * 5)) % 10000;
        if (zPos < 0) zPos += 10000;
        
        if (zPos < 2000) {
            let scale = 100 / (zPos + 10);
            let screenX = w/2 + (item.x - state.playerX) * scale * 500;
            let screenY = midY + scale * 50;
            let size = scale * 300;

            if (item.type === 'building') {
                ctx.fillStyle = "#999";
                ctx.fillRect(screenX - size/2, screenY - size, size, size);
                ctx.strokeStyle = "#444";
                ctx.strokeRect(screenX - size/2, screenY - size, size, size);
            } else {
                ctx.fillStyle = "green";
                ctx.beginPath();
                ctx.arc(screenX, screenY - size/2, size/3, 0, Math.PI*2);
                ctx.fill();
            }
        }
    });

    // バス停ポールが近づいた時の描画
    if (state.stopIndex < stops.length) {
        let stopDist = (stops[state.stopIndex].dist - state.distance) * 5;
        if (stopDist > 0 && stopDist < 1000) {
            let scale = 100 / (stopDist + 10);
            let sx = w/2 + (1.2 - state.playerX) * scale * 500;
            ctx.fillStyle = "#e60012";
            ctx.fillRect(sx, midY + scale * 50 - scale * 150, 10 * scale, 150 * scale);
            ctx.fillStyle = "white";
            ctx.fillText("BUS STOP", sx, midY);
        }
    }

    // フロントガラスのフレーム（運転席感）
    ctx.strokeStyle = "#222";
    ctx.lineWidth = 40;
    ctx.strokeRect(0, 0, w, h);
    
    // ワイパー（静止）
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.moveTo(w * 0.1, h);
    ctx.lineTo(w * 0.4, h * 0.8);
    ctx.stroke();

    update();
    requestAnimationFrame(draw);
}

createWorld();
draw();
</script>
</body>
</html>
